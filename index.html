<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属 AI 智能体 v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --side: #f1f5f9;
            --card: #ffffff;
            --bdr: #e2e8f0;
            --txt: #1e293b;
            --t2: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --weekly: #3b82f6;
            --learn: #22c55e;
            --code: #8b5cf6;
        }
        .dark {
            --bg: #0f172a;
            --side: #1e293b;
            --card: #1e293b;
            --bdr: #334155;
            --txt: #f1f5f9;
            --t2: #94a3b8;
        }
        .theme-purple {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
        }
        .theme-green {
            --primary: #22c55e;
            --primary-hover: #16a34a;
        }
        .theme-orange {
            --primary: #f97316;
            --primary-hover: #ea580c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font: 14px/1.6 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--txt);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: var(--side);
            border-right: 1px solid var(--bdr);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--bdr);
        }
        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .sidebar-header p { font-size: 12px; color: var(--t2); }
        
        .new-chat-btn {
            margin: 12px;
            padding: 10px;
            text-align: center;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background: var(--primary-hover); }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .chat-item:hover { background: var(--card); }
        .chat-item.on { background: var(--card); font-weight: 500; }
        .chat-item .title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chat-item .del {
            opacity: 0;
            font-size: 16px;
            color: var(--danger);
            padding: 0 4px;
            cursor: pointer;
        }
        .chat-item:hover .del { opacity: 1; }
        
        .mode-tabs {
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 4px;
            border-bottom: 1px solid var(--bdr);
        }
        .mode-tab {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .mode-tab:hover { background: var(--card); }
        .mode-tab.on {
            background: var(--card);
            border-color: var(--bdr);
            font-weight: 500;
        }
        .mode-tab .icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .tab-weekly .icon { background: rgba(59, 130, 246, 0.1); color: var(--weekly); }
        .tab-learn .icon { background: rgba(34, 197, 94, 0.1); color: var(--learn); }
        .tab-code .icon { background: rgba(139, 92, 246, 0.1); color: var(--code); }
        
        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--bdr);
        }
        .sidebar-footer label {
            display: block;
            font-size: 11px;
            color: var(--t2);
            margin-bottom: 4px;
        }
        .sidebar-footer select, .sidebar-footer input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--bdr);
            border-radius: 6px;
            font-size: 12px;
            background: var(--bg);
            color: var(--txt);
            outline: none;
            margin-bottom: 8px;
        }
        .sidebar-footer input:focus, .sidebar-footer select:focus { border-color: var(--primary); }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .header {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--bdr);
            background: var(--card);
            gap: 16px;
            flex-shrink: 0;
        }
        .header .title { font-size: 15px; font-weight: 600; }
        .header .desc { font-size: 12px; color: var(--t2); margin-left: 12px; }
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-right button {
            padding: 6px 12px;
            border: 1px solid var(--bdr);
            border-radius: 6px;
            background: var(--card);
            cursor: pointer;
            font-size: 12px;
            color: var(--txt);
            transition: background 0.2s;
        }
        .header-right button:hover { background: var(--side); }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .welcome {
            text-align: center;
            margin-top: 60px;
            color: var(--t2);
        }
        .welcome .icon { font-size: 56px; margin-bottom: 12px; }
        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--txt);
        }
        .welcome p { font-size: 14px; max-width: 400px; margin: 0 auto 24px; }
        .templates {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .template-chip {
            padding: 8px 14px;
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .template-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            position: relative;
        }
        .bubble.user {
            background: var(--primary);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .bubble.assistant {
            background: var(--side);
            border: 1px solid var(--bdr);
            border-bottom-left-radius: 4px;
        }
        .bubble .role {
            font-size: 10px;
            opacity: 0.6;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .bubble .content { font-family: inherit; }
        .bubble .content h1 { font-size: 18px; margin: 12px 0 8px; }
        .bubble .content h2 { font-size: 16px; margin: 10px 0 6px; }
        .bubble .content h3 { font-size: 14px; margin: 8px 0 4px; }
        .bubble .content p { margin: 6px 0; }
        .bubble .content ul, .bubble .content ol { padding-left: 20px; margin: 6px 0; }
        .bubble .content li { margin: 4px 0; }
        .bubble .content code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .bubble.user .content code { background: rgba(255,255,255,0.2); }
        .bubble .content pre {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            position: relative;
        }
        .bubble .content pre code {
            background: transparent;
            padding: 0;
            font-size: 12px;
            color: #e2e8f0;
            white-space: pre;
        }
        .bubble .content pre .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 4px;
            color: #94a3b8;
            font-size: 11px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .bubble .content pre:hover .copy-btn { opacity: 1; }
        .bubble .content pre .copy-btn:hover { background: rgba(255,255,255,0.2); }
        
        .bubble .bubble-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--bdr);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .bubble.assistant:hover .bubble-actions { opacity: 1; }
        .bubble .bubble-actions button {
            padding: 4px 10px;
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            color: var(--t2);
        }
        .bubble .bubble-actions button:hover { color: var(--primary); border-color: var(--primary); }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--t2);
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1); }
        }
        
        .input-area {
            padding: 12px 24px 20px;
            background: var(--card);
            border-top: 1px solid var(--bdr);
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            position: relative;
            border: 1px solid var(--bdr);
            border-radius: 12px;
            background: var(--bg);
            transition: border-color 0.2s;
        }
        .input-box:focus-within { border-color: var(--primary); }
        .input-box textarea {
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--txt);
            outline: none;
            resize: none;
            font: inherit;
            max-height: 200px;
            min-height: 48px;
        }
        .input-tools {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            border-top: 1px solid var(--bdr);
        }
        .input-tool {
            padding: 4px 8px;
            font-size: 11px;
            color: var(--t2);
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .input-tool:hover { background: var(--side); color: var(--primary); }
        
        .send-btn {
            padding: 0 22px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            height: 48px;
            transition: background 0.2s;
        }
        .send-btn:hover { background: var(--primary-hover); }
        .send-btn:disabled { background: var(--t2); cursor: not-allowed; }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--bdr);
        }
        .modal h3 { margin-bottom: 16px; font-size: 16px; }
        .modal label {
            display: block;
            font-size: 12px;
            color: var(--t2);
            margin-bottom: 6px;
        }
        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            font-size: 13px;
            background: var(--bg);
            color: var(--txt);
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .modal textarea { min-height: 120px; resize: vertical; }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .modal-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--bdr);
            background: var(--card);
            cursor: pointer;
            font-size: 13px;
            color: var(--txt);
        }
        .modal-actions button.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .theme-picker {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .theme-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-dot.active { border-color: var(--txt); }
        .theme-blue { background: #3b82f6; }
        .theme-purple-dot { background: #8b5cf6; }
        .theme-green-dot { background: #22c55e; }
        .theme-orange-dot { background: #f97316; }
        
        .kb-panel {
            padding: 8px 12px;
            border-top: 1px solid var(--bdr);
        }
        .kb-panel .kb-title {
            font-size: 11px;
            color: var(--t2);
            margin-bottom: 6px;
        }
        .kb-panel .kb-count {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: fixed; z-index: 50; height: 100%; display: none; }
            .sidebar.open { display: flex; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>我的 AI 智能体</h1>
            <p>v2.0 · 全能助手</p>
        </div>
        <div class="new-chat-btn" id="newChatBtn">+ 新建对话</div>
        <div class="chat-list" id="chatList"></div>
        <div class="mode-tabs">
            <div class="mode-tab tab-weekly on" data-mode="weekly">
                <span class="icon">📝</span>
                <span>写周报</span>
            </div>
            <div class="mode-tab tab-learn" data-mode="learn">
                <span class="icon">📚</span>
                <span>学知识</span>
            </div>
            <div class="mode-tab tab-code" data-mode="code">
                <span class="icon">💻</span>
                <span>改代码</span>
            </div>
        </div>
        <div class="kb-panel">
            <div class="kb-title">📦 个人知识库</div>
            <div class="kb-count" id="kbCount">0 条文档</div>
        </div>
        <div class="sidebar-footer">
            <label>API Provider</label>
            <select id="provider">
                <option value="agnes">Agnes-AI</option>
                <option value="deepseek">DeepSeek</option>
                <option value="qwen">通义千问</option>
                <option value="glm">智谱GLM</option>
                <option value="moonshot">MoonShot</option>
                <option value="openai">OpenAI</option>
                <option value="ollama">Ollama</option>
            </select>
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." value="">
        </div>
    </div>
    
    <div class="main">
        <div class="header">
            <div style="display:flex;align-items:center">
                <span class="title" id="modeTitle">写周报助手</span>
                <span class="desc" id="modeDesc">输入关键词，自动生成完整周报</span>
            </div>
            <div class="header-right">
                <button id="exportBtn">📥 导出</button>
                <button id="kbBtn">📦 知识库</button>
                <button id="themeBtn">🌓</button>
                <button id="settingsBtn">⚙️</button>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome">
                <div class="icon" id="welcomeIcon">📝</div>
                <h2>写周报助手</h2>
                <p>输入本周工作关键词，我来帮你生成完整的周报内容</p>
                <div class="templates" id="templateList"></div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="messageInput" placeholder="输入消息... (Shift+Enter 换行, Enter 发送)"></textarea>
                    <div class="input-tools">
                        <span class="input-tool" id="uploadFileBtn">📎 上传文件</span>
                        <span class="input-tool" id="insertCodeBtn">💻 插入代码</span>
                        <input type="file" id="fileInput" accept=".txt,.md,.py,.js,.ts,.java,.go,.rs,.c,.cpp,.h,.html,.css,.json,.yaml,.yml,.xml,.sql,.sh,.bat" style="display:none">
                    </div>
                </div>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="kbModal">
        <div class="modal">
            <h3>📦 个人知识库</h3>
            <p style="font-size:12px;color:var(--t2);margin-bottom:16px">上传文档后，AI 回答时会参考知识库内容</p>
            <label>文档标题</label>
            <input type="text" id="kbTitle" placeholder="例如：项目需求文档">
            <label>文档内容</label>
            <textarea id="kbContent" placeholder="粘贴或输入文档内容..."></textarea>
            <div id="kbDocList" style="margin-top:12px"></div>
            <div class="modal-actions">
                <button onclick="closeModal('kbModal')">关闭</button>
                <button class="primary" id="kbSaveBtn">添加到知识库</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ 设置</h3>
            <label>主题色</label>
            <div class="theme-picker">
                <div class="theme-dot theme-blue active" data-theme="blue"></div>
                <div class="theme-dot theme-purple-dot" data-theme="purple"></div>
                <div class="theme-dot theme-green-dot" data-theme="green"></div>
                <div class="theme-dot theme-orange-dot" data-theme="orange"></div>
            </div>
            <label style="margin-top:16px">深色模式</label>
            <div style="display:flex;gap:8px;align-items:center">
                <button id="toggleDarkBtn" style="padding:6px 12px;border:1px solid var(--bdr);border-radius:6px;background:var(--card);cursor:pointer;color:var(--txt)">切换深色模式</button>
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('settingsModal')">关闭</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <h3>📥 导出对话</h3>
            <label>导出格式</label>
            <select id="exportFormat" style="width:100%;padding:10px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg);color:var(--txt)">
                <option value="markdown">Markdown (.md)</option>
                <option value="text">纯文本 (.txt)</option>
            </select>
            <div class="modal-actions">
                <button onclick="closeModal('exportModal')">取消</button>
                <button class="primary" id="confirmExportBtn">导出</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="codeModal">
        <div class="modal" style="width:600px">
            <h3>💻 插入代码</h3>
            <label>编程语言</label>
            <select id="codeLang" style="width:100%;padding:10px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg);color:var(--txt)">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="typescript">TypeScript</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="sql">SQL</option>
                <option value="bash">Bash</option>
            </select>
            <label>代码内容</label>
            <textarea id="codeContent" placeholder="粘贴你的代码..." style="font-family:Consolas,Monaco,monospace;font-size:12px;min-height:200px"></textarea>
            <div class="modal-actions">
                <button onclick="closeModal('codeModal')">取消</button>
                <button class="primary" id="insertCodeConfirm">插入</button>
            </div>
        </div>
    </div>
    <script>
    /* ============================================================
     *  AI 智能体前端逻辑
     *  模块划分：配置 / 状态 / 工具函数 / 渲染 / API / 交互
     * ============================================================ */
    (function () {
        'use strict';

        // ── 常量配置 ────────────────────────────────────────────────
        const PROV_MAP = {
            agnes:    { url: 'https://apihub.agnes-ai.com/v1',            model: 'agnes-2.0-flash' },
            deepseek: { url: 'https://api.deepseek.com',                  model: 'deepseek-chat' },
            qwen:     { url: 'https://dashscope.aliyuncs.com/compatible-mode/v1', model: 'qwen-plus' },
            glm:      { url: 'https://open.bigmodel.cn/api/paas/v4',      model: 'glm-4' },
            moonshot: { url: 'https://api.moonshot.cn/v1',                model: 'moonshot-v1-8k' },
            openai:   { url: 'https://api.openai.com/v1',                 model: 'gpt-4o' },
            ollama:   { url: 'http://localhost:11434/v1',                 model: 'qwen2.5:7b' },
            zeroone:  { url: 'https://api.lingyiwanwu.com/v1',            model: 'yi-lightning' },
        };

        const MODE_INFO = {
            weekly: { title: '写周报助手', desc: '输入关键词，自动生成完整周报', icon: '📝' },
            learn:  { title: '学知识助手', desc: '输入主题，搜索资料并整理成学习笔记', icon: '📚' },
            code:   { title: '改代码助手', desc: '粘贴代码，分析问题并给出优化方案', icon: '💻' },
        };

        const STORAGE_KEYS = {
            provider: 'agent_provider',
            apiKey:   'agent_api_key',
            dark:     'agent_dark',
            theme:    'agent_theme',
            chatList: 'agent_chat_list',
        };

        const FILE_LANG_MAP = {
            py: 'python', js: 'javascript', ts: 'typescript', java: 'java',
            go: 'go', rs: 'rust', c: 'c', cpp: 'cpp', h: 'c',
            html: 'html', css: 'css', json: 'json', sql: 'sql',
            sh: 'bash', bat: 'bash', md: 'markdown', txt: 'text',
        };

        // ── 应用状态 ────────────────────────────────────────────────
        const state = {
            currentMode: 'weekly',
            currentChatId: null,
            messages: [],
            chatList: [],
            isStreaming: false,
        };

        // ── 工具函数 ────────────────────────────────────────────────
        const $ = id => document.getElementById(id);

        /** 防抖：最后一次调用后 delay ms 执行 */
        function debounce(fn, delay) {
            let t = null;
            return function (...args) {
                clearTimeout(t);
                t = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        /** 安全转义 HTML */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /** 本地存储读写（带 try/catch 防隐私模式报错） */
        const storage = {
            get(key, def = '') {
                try { return localStorage.getItem(key) || def; }
                catch (_) { return def; }
            },
            set(key, val) {
                try { localStorage.setItem(key, val); }
                catch (_) { /* 忽略 */ }
            },
            remove(key) {
                try { localStorage.removeItem(key); }
                catch (_) { /* 忽略 */ }
            },
        };

        // ── Markdown 渲染 ───────────────────────────────────────────
        const mdRules = [
            [/^### (.*$)/gim, '<h3>$1</h3>'],
            [/^## (.*$)/gim,  '<h2>$1</h2>'],
            [/^# (.*$)/gim,   '<h1>$1</h1>'],
            [/\*\*(.*?)\*\*/g, '<strong>$1</strong>'],
            [/\*(.*?)\*/g,     '<em>$1</em>'],
            [/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>'],
            [/`([^`]+)`/g,    '<code>$1</code>'],
            [/^- (.*$)/gim,   '<li>$1</li>'],
            [/^(\d+)\. (.*$)/gim, '<li>$1. $2</li>'],
        ];

        function formatMarkdown(text) {
            if (!text) return '';
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            for (const [pattern, replacement] of mdRules) {
                html = html.replace(pattern, replacement);
            }

            // 列表包裹
            html = html.replace(/(<li>[\s\S]*?<\/li>)/g, function (match) {
                if (!match.includes('<ul>') && !match.includes('<ol>')) {
                    return '<ul>' + match + '</ul>';
                }
                return match;
            });
            html = html.replace(/<\/ul>\s*<ul>/g, '');
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        /** 给代码块加复制按钮 */
        function addCopyButtons(container) {
            if (!container) return;
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return; // 防止重复
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = '复制';
                btn.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    if (!code) return;
                    navigator.clipboard.writeText(code.innerText).then(() => {
                        btn.textContent = '已复制';
                        setTimeout(() => { btn.textContent = '复制'; }, 1500);
                    });
                });
                pre.appendChild(btn);
            });
        }

        /** 高亮代码块（节流：避免流式渲染时频繁调用） */
        const highlightBlocks = debounce(function (container) {
            if (typeof hljs === 'undefined' || !container) return;
            container.querySelectorAll('pre code').forEach(block => {
                if (block.dataset.highlighted) return;
                try {
                    hljs.highlightElement(block);
                    block.dataset.highlighted = '1';
                } catch (_) { /* 忽略 */ }
            });
        }, 300);

        // ── API 封装 ────────────────────────────────────────────────
        const api = {
            async chatStream(payload, onContent, onDone, onError) {
                try {
                    const resp = await fetch('/chat/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });

                    if (!resp.ok) {
                        throw new Error('HTTP ' + resp.status);
                    }

                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.error) { onError(data.error); return; }
                                if (data.done)  { onDone(); return; }
                                if (data.content) { onContent(data.content); }
                            } catch (_) { /* 忽略解析失败 */ }
                        }
                    }
                } catch (err) {
                    onError(err.message);
                }
            },

            async getKb() {
                const r = await fetch('/kb');
                return r.json();
            },

            async uploadKb(title, content) {
                const r = await fetch('/kb/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content }),
                });
                return r.json();
            },

            async exportChat(messages, format) {
                const r = await fetch('/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, format }),
                });
                return r.json();
            },
        };

        // ── 渲染层 ──────────────────────────────────────────────────
        function renderMessages() {
            const chatArea = $('chatArea');

            if (state.messages.length === 0) {
                const info = MODE_INFO[state.currentMode];
                const templates = getTemplates(state.currentMode);
                chatArea.innerHTML = `
                    <div class="welcome">
                        <div class="icon">${info.icon}</div>
                        <h2>${info.title}</h2>
                        <p>${info.desc}</p>
                        <div class="templates">
                            ${templates.map(t => `<span class="template-chip" data-tpl="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    </div>
                `;
                // 模板点击
                chatArea.querySelectorAll('.template-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        $('messageInput').value = chip.dataset.tpl;
                        $('messageInput').focus();
                        autoResizeInput();
                    });
                });
                return;
            }

            chatArea.innerHTML = state.messages.map((msg, i) => {
                const role = msg.role === 'user' ? '我' : '助手';
                const contentHtml = msg.role === 'user'
                    ? escapeHtml(msg.content)
                    : formatMarkdown(msg.content);
                const actions = msg.role === 'assistant'
                    ? `<div class="bubble-actions">
                         <button onclick="copyMessage(${i})">📋 复制</button>
                         <button onclick="regenerateMessage()">🔄 重新生成</button>
                       </div>`
                    : '';
                return `
                    <div class="bubble ${msg.role}">
                        <div class="role">${role}</div>
                        <div class="content">${contentHtml}</div>
                        ${actions}
                    </div>
                `;
            }).join('');

            addCopyButtons(chatArea);
            highlightBlocks(chatArea);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function renderChatList() {
            const list = $('chatList');
            if (state.chatList.length === 0) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t2);font-size:12px">暂无对话</div>';
                return;
            }
            list.innerHTML = state.chatList.map(chat => `
                <div class="chat-item ${chat.id === state.currentChatId ? 'on' : ''}" data-id="${chat.id}">
                    <span class="title">${escapeHtml(chat.title)}</span>
                    <span class="del" data-del="${chat.id}">×</span>
                </div>
            `).join('');

            list.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.dataset.del) {
                        e.stopPropagation();
                        deleteChat(e.target.dataset.del);
                        return;
                    }
                    openChat(item.dataset.id);
                });
            });
        }

        function setMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => {
                t.classList.toggle('on', t.dataset.mode === mode);
            });
            const info = MODE_INFO[mode];
            document.querySelector('.header .title').textContent = info.title;
            // 切换模式新建对话
            newChat();
        }

        function getTemplates(mode) {
            const map = {
                weekly: ['本周完成了用户管理模块开发', '参加了3次产品评审会议', '优化了首页加载性能'],
                learn:  ['请介绍一下 React Hooks', '帮我学习 Python 装饰器', '什么是向量数据库'],
                code:   ['优化这段 Python 代码', '帮我找 bug', '重构这个函数'],
            };
            return map[mode] || [];
        }

        // ── 对话管理 ────────────────────────────────────────────────
        function newChat() {
            state.currentChatId = null;
            state.messages = [];
            renderMessages();
            renderChatList();
        }

        function openChat(chatId) {
            const saved = storage.get(STORAGE_KEYS.chatList, '[]');
            try {
                const list = JSON.parse(saved);
                const chat = list.find(c => c.id === chatId);
                if (chat) {
                    state.currentChatId = chatId;
                    state.messages = chat.messages || [];
                    if (chat.mode) state.currentMode = chat.mode;
                    renderMessages();
                    renderChatList();
                }
            } catch (_) { /* 忽略 */ }
        }

        function saveCurrentChat() {
            if (!state.currentChatId || state.messages.length === 0) return;

            let list = [];
            try {
                list = JSON.parse(storage.get(STORAGE_KEYS.chatList, '[]'));
            } catch (_) { list = []; }

            const title = state.messages[0]?.content?.slice(0, 30) || '新对话';
            const idx = list.findIndex(c => c.id === state.currentChatId);
            const chatData = {
                id: state.currentChatId,
                title,
                messages: state.messages,
                mode: state.currentMode,
                time: Date.now(),
            };

            if (idx >= 0) {
                list[idx] = chatData;
            } else {
                list.unshift(chatData);
            }

            // 最多保存 50 条
            if (list.length > 50) list = list.slice(0, 50);
            storage.set(STORAGE_KEYS.chatList, JSON.stringify(list));
            state.chatList = list;
        }

        function deleteChat(chatId) {
            if (!confirm('确定删除这个对话吗？')) return;
            let list = [];
            try {
                list = JSON.parse(storage.get(STORAGE_KEYS.chatList, '[]'));
            } catch (_) { list = []; }
            list = list.filter(c => c.id !== chatId);
            storage.set(STORAGE_KEYS.chatList, JSON.stringify(list));
            state.chatList = list;

            if (state.currentChatId === chatId) {
                newChat();
            } else {
                renderChatList();
            }
        }

        function loadChatList() {
            try {
                state.chatList = JSON.parse(storage.get(STORAGE_KEYS.chatList, '[]'));
            } catch (_) {
                state.chatList = [];
            }
            renderChatList();
        }

        // ── 发送消息 ────────────────────────────────────────────────
        async function sendMessage() {
            const input = $('messageInput');
            const text = input.value.trim();
            if (!text || state.isStreaming) return;

            const apiKey = $('apiKey').value.trim();
            if (!apiKey) {
                alert('请先填写 API Key');
                return;
            }

            const provider = $('provider').value;
            const config = PROV_MAP[provider];

            if (!state.currentChatId) {
                state.currentChatId = Date.now().toString();
            }

            input.value = '';
            autoResizeInput();
            state.messages.push({ role: 'user', content: text });
            renderMessages();
            saveCurrentChat();

            state.isStreaming = true;
            $('sendBtn').disabled = true;

            // 创建流式消息气泡
            const chatArea = $('chatArea');
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble assistant';
            bubbleDiv.innerHTML = `
                <div class="role">助手</div>
                <div class="content"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            chatArea.appendChild(bubbleDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            const contentEl = bubbleDiv.querySelector('.content');
            let fullText = '';

            api.chatStream(
                {
                    mode: state.currentMode,
                    message: text,
                    api_key: apiKey,
                    base_url: config.url,
                    model: config.model,
                    chat_id: state.currentChatId,
                    history: state.messages.slice(0, -1),
                },
                // onContent
                function (chunk) {
                    fullText += chunk;
                    contentEl.innerHTML = formatMarkdown(fullText);
                    addCopyButtons(bubbleDiv);
                    highlightBlocks(bubbleDiv);
                    chatArea.scrollTop = chatArea.scrollHeight;
                },
                // onDone
                function () {
                    state.messages.push({ role: 'assistant', content: fullText });
                    saveCurrentChat();
                    renderMessages();
                    loadChatList();
                    finishStreaming();
                },
                // onError
                function (errMsg) {
                    contentEl.innerHTML = '❌ 错误：' + escapeHtml(errMsg);
                    finishStreaming();
                }
            );
        }

        function finishStreaming() {
            state.isStreaming = false;
            $('sendBtn').disabled = false;
        }

        // ── 消息操作 ────────────────────────────────────────────────
        window.copyMessage = function (idx) {
            const msg = state.messages[idx];
            if (msg) {
                navigator.clipboard.writeText(msg.content || '').then(() => {
                    alert('已复制到剪贴板');
                });
            }
        };

        window.regenerateMessage = function () {
            const lastUserIdx = state.messages.length - 2;
            if (lastUserIdx < 0 || state.messages[lastUserIdx].role !== 'user') return;
            const userMsg = state.messages[lastUserIdx].content;
            state.messages = state.messages.slice(0, lastUserIdx);
            saveCurrentChat();
            renderMessages();
            setTimeout(() => {
                $('messageInput').value = userMsg;
                sendMessage();
            }, 100);
        };

        // ── 导出 ────────────────────────────────────────────────────
        function exportChat() {
            openModal('exportModal');
        }

        function confirmExport() {
            const format = $('exportFormat').value;
            api.exportChat(state.messages, format).then(data => {
                if (data.content) {
                    const blob = new Blob([data.content], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const ext = format === 'markdown' ? 'md' : 'txt';
                    a.download = '对话记录_' + new Date().toISOString().slice(0, 10) + '.' + ext;
                    a.click();
                    URL.revokeObjectURL(url);
                    closeModal('exportModal');
                }
            }).catch(() => alert('导出失败'));
        }

        // ── 知识库 ──────────────────────────────────────────────────
        function openKbModal() {
            openModal('kbModal');
            loadKbDocs();
        }

        function loadKbDocs() {
            api.getKb().then(data => {
                $('kbCount').textContent = (data.count || 0) + ' 条文档';
                const list = $('kbDocList');
                if (data.docs && data.docs.length) {
                    list.innerHTML = '<div style="font-size:12px;color:var(--t2);margin-bottom:6px">已有文档：</div>' +
                        data.docs.map(d =>
                            '<div style="padding:6px 10px;background:var(--bg);border-radius:4px;font-size:12px;margin-bottom:4px">' + escapeHtml(d.title) + '</div>'
                        ).join('');
                } else {
                    list.innerHTML = '<div style="font-size:12px;color:var(--t2)">暂无文档</div>';
                }
            }).catch(() => {
                $('kbCount').textContent = '知识库离线';
            });
        }

        function saveKb() {
            const title = $('kbTitle').value.trim();
            const content = $('kbContent').value.trim();
            if (!content) { alert('请输入文档内容'); return; }

            api.uploadKb(title, content).then(data => {
                if (data.ok) {
                    alert('添加成功！');
                    $('kbTitle').value = '';
                    $('kbContent').value = '';
                    loadKbDocs();
                } else {
                    alert('添加失败：' + (data.error || '未知错误'));
                }
            }).catch(() => alert('添加失败'));
        }

        // ── 模态框 ──────────────────────────────────────────────────
        function openModal(id) {
            $(id).classList.add('show');
        }

        function closeModal(id) {
            $(id).classList.remove('show');
        }

        // ── 代码插入 ────────────────────────────────────────────────
        function insertCode() {
            openModal('codeModal');
        }

        function confirmInsertCode() {
            const lang = $('codeLang').value;
            const code = $('codeContent').value;
            if (!code) { closeModal('codeModal'); return; }
            insertCodeBlock('```' + lang + '\n' + code + '\n```\n');
            closeModal('codeModal');
        }

        function insertCodeBlock(block) {
            const input = $('messageInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            input.value = input.value.slice(0, start) + block + input.value.slice(end);
            input.focus();
            input.selectionStart = input.selectionEnd = start + block.length;
            autoResizeInput();
        }

        // ── 主题 & 深色模式 ─────────────────────────────────────────
        function toggleDark() {
            document.body.classList.toggle('dark');
            storage.set(STORAGE_KEYS.dark, document.body.classList.contains('dark') ? '1' : '');
        }

        function setTheme(theme) {
            document.body.classList.remove('theme-purple', 'theme-green', 'theme-orange');
            if (theme && theme !== 'blue') {
                document.body.classList.add('theme-' + theme);
            }
            document.querySelectorAll('.theme-dot').forEach(d => {
                d.classList.toggle('active', d.dataset.theme === theme);
            });
            storage.set(STORAGE_KEYS.theme, theme);
        }

        // ── 配置持久化 ──────────────────────────────────────────────
        function saveConfig() {
            storage.set(STORAGE_KEYS.provider, $('provider').value);
            storage.set(STORAGE_KEYS.apiKey, $('apiKey').value.trim());
        }

        function loadConfig() {
            const provider = storage.get(STORAGE_KEYS.provider, 'deepseek');
            const apiKey = storage.get(STORAGE_KEYS.apiKey, '');
            $('provider').value = provider;
            $('apiKey').value = apiKey;

            if (storage.get(STORAGE_KEYS.dark, '') === '1') {
                document.body.classList.add('dark');
            }

            const theme = storage.get(STORAGE_KEYS.theme, 'blue');
            setTheme(theme);
        }

        // ── 文件上传 ────────────────────────────────────────────────
        function handleFileUpload(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const content = e.target.result;
                const ext = file.name.split('.').pop().toLowerCase();
                const lang = FILE_LANG_MAP[ext] || 'text';
                insertCodeBlock('```' + lang + '\n' + content + '\n```\n');
            };
            reader.readAsText(file);
        }

        // ── 输入框自适应高度 ────────────────────────────────────────
        function autoResizeInput() {
            const input = $('messageInput');
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        }

        // ── 事件绑定 ────────────────────────────────────────────────
        function bindEvents() {
            // 配置
            $('provider').addEventListener('change', saveConfig);
            $('apiKey').addEventListener('input', debounce(saveConfig, 300));

            // 模式切换
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.addEventListener('click', () => setMode(tab.dataset.mode));
            });

            // 发送
            $('sendBtn').addEventListener('click', sendMessage);
            $('newChatBtn').addEventListener('click', newChat);
            $('exportBtn').addEventListener('click', exportChat);
            $('kbBtn').addEventListener('click', openKbModal);
            $('kbSaveBtn').addEventListener('click', saveKb);
            $('confirmExportBtn').addEventListener('click', confirmExport);
            $('settingsBtn').addEventListener('click', () => openModal('settingsModal'));
            $('insertCodeBtn').addEventListener('click', insertCode);
            $('insertCodeConfirm').addEventListener('click', confirmInsertCode);
            $('toggleDarkBtn').addEventListener('click', toggleDark);
            $('themeBtn').addEventListener('click', toggleDark);
            $('kbCount').addEventListener('click', openKbModal);

            // 文件上传
            $('uploadFileBtn').addEventListener('click', () => $('fileInput').click());
            $('fileInput').addEventListener('change', function () {
                handleFileUpload(this.files[0]);
                this.value = '';
            });

            // 主题色
            document.querySelectorAll('.theme-dot').forEach(dot => {
                dot.addEventListener('click', () => setTheme(dot.dataset.theme));
            });

            // 输入框
            $('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            $('messageInput').addEventListener('input', autoResizeInput);

            // 模态框点击外部关闭
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) overlay.classList.remove('show');
                });
            });

            // ESC 关闭所有模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal-overlay.show').forEach(m => {
                        m.classList.remove('show');
                    });
                }
            });
        }

        // ── 初始化 ──────────────────────────────────────────────────
        function init() {
            loadConfig();
            loadChatList();
            renderMessages();
            bindEvents();
            loadKbDocs();
        }

        // 启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
    </script>
</body>
</html>
